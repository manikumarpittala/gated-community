<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Gated Community</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="brand-logo">
      <div class="logo-icon">📝</div>
    </div>
    <div class="page-title">
      <h1>Create Account</h1>
      <span>Join the Gowrayapally Community</span>
    </div>

    <form action="register" method="post">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="text" id="email" name="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password">
      </div>
      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Your full name">
      </div>
      <input type="submit" value="Register">
    </form>

    <p class="link-line">Already a member? <a href="index.html">Login here</a></p>
  </div>
</body>
</html>
